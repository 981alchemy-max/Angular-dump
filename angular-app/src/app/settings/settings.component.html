<div class="page">
  <h1 class="page-title">Settings</h1>
  <p class="page-subtitle">Manage your account preferences.</p>

  <section class="section">
    <h2 class="section-title">Profile</h2>
    <div class="field">
      <label for="name">Name</label>
      <input id="name" type="text" [(ngModel)]="name" />
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" [(ngModel)]="email" />
    </div>
    <button class="btn-save">Save Changes</button>
  </section>

  <section class="section">
    <h2 class="section-title">Preferences</h2>
    <div class="toggle-row">
      <div>
        <div class="toggle-label">Email Notifications</div>
        <div class="toggle-desc">Receive updates and alerts by email.</div>
      </div>
      <label class="toggle">
        <input type="checkbox" [(ngModel)]="notifications" />
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <div>
        <div class="toggle-label">Dark Mode</div>
        <div class="toggle-desc">Switch to a darker colour scheme.</div>
      </div>
      <label class="toggle">
        <input type="checkbox" [(ngModel)]="darkMode" />
        <span class="slider"></span>
      </label>
    </div>
  </section>
</div>
